<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: light dark; }
      body {
        width: 260px;
        margin: 0;
        padding: 14px 16px;
        font: 13px/1.45 system-ui, sans-serif;
      }
      h1 { font-size: 14px; margin: 0 0 2px; display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
      .running-tag {
        font-size: 10px;
        font-weight: 600;
        color: #16a34a;
        letter-spacing: 0.02em;
      }
      .running-tag[hidden] { display: none; }
      p.sub { margin: 0 0 12px; color: #6b7280; font-size: 11px; word-break: break-all; }
      .row { display: flex; gap: 8px; margin-bottom: 12px; }
      button {
        flex: 1;
        padding: 8px 0;
        font: inherit;
        font-weight: 600;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        color: #fff;
      }
      #start { background: #6366f1; }
      #stop { background: #ef4444; }
      button:disabled { opacity: 0.5; cursor: default; }
      #status {
        padding: 8px 10px;
        border-radius: 6px;
        background: #f3f4f6;
        color: #111;
        min-height: 18px;
        font-size: 12px;
      }
      #version {
        margin-top: 8px;
        text-align: right;
        color: #9ca3af;
        font-size: 10px;
      }
      @media (prefers-color-scheme: dark) {
        #status { background: #1f2937; color: #e5e7eb; }
        #debug { background: #1f2937; color: #e5e7eb; }
        #debug .k { color: #9ca3af; }
      }
      #debug {
        margin-top: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        background: #f3f4f6;
        font-size: 11px;
        display: grid;
        grid-template-columns: auto 1fr;
        column-gap: 8px;
        row-gap: 3px;
      }
      #debug .k { color: #6b7280; }
      #debug .v { text-align: right; font-variant-numeric: tabular-nums; }
      #debug .v.flag { color: #ef4444; font-weight: 600; }
      #debug .v.phase-funnel { color: #16a34a; font-weight: 600; }
      #debug .v.phase-redirecting { color: #6366f1; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Conditional Navigation <span id="running-tag" class="running-tag" hidden>Running</span></h1>
    <p class="sub">Loops the source URL past google.com until it lands on uplevelrewards.com, then scrapes.</p>
    <div class="row">
      <button id="start">Start</button>
      <button id="stop">Stop</button>
    </div>
    <div id="status">Idle.</div>
    <div id="debug">
      <span class="k">phase</span><span class="v" id="dbg-phase">—</span>
      <span class="k">idle</span><span class="v" id="dbg-idle">—</span>
      <span class="k">retries</span><span class="v" id="dbg-retries">—</span>
      <span class="k">unknown</span><span class="v" id="dbg-unknown">—</span>
      <span class="k">recoveries</span><span class="v" id="dbg-recoveries">—</span>
      <span class="k">identity</span><span class="v" id="dbg-identity">—</span>
      <span class="k">tabId</span><span class="v" id="dbg-tabid">—</span>
    </div>
    <div id="version"></div>
    <script src="popup.js"></script>
  </body>
</html>
